<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Location Weather</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="layout">
    <div class="panel">
      <header class="panel-header">
        <h1>Location Weather</h1>
        <p>Get weather for your exact coordinates and store the location in Supabase.</p>
      </header>

      <div class="controls">
        <button id="fetchButton">Fetch Weather</button>
      </div>

      <div id="status" class="status">Press the button to start.</div>

      <section id="weather" class="weather hidden">
        <div class="weather-top">
          <div>
            <h2 id="city">Unknown</h2>
            <p id="coords">00.0000, 00.0000</p>
          </div>
          <div class="temperature">
            <span id="temperature">--°C</span>
          </div>
        </div>

        <div class="weather-info">
          <div><span>Description</span><strong id="description">-</strong></div>
          <div><span>Humidity</span><strong id="humidity">-</strong></div>
          <div><span>Wind</span><strong id="wind">-</strong></div>
        </div>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
